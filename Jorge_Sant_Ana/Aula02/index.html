<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="./vue.js"></script>
</head>
<body>
    <div id="app">
        {{somar()}} <br>
        {{subtrair()}}<br>
        {{multiplicar()}}<br>
        {{dividir()}}<br>
        {{numeroAleatorio()}}
    </div>
    <script>
        options = {
            el: "#app", // # para selecionar por id e . para selecionar por class
            data: {},
            methods: {
                somar: function somar(){ // Sintaxe Convencional
                    return 4 + 2
                },
                subtrair: function(){ // anônima
                    return 4 - 2
                },
                multiplicar: ()=>{ // Arrow Function
                    return 4 * 2
                },
                dividir(){ // Forma mais enxuta
                    return 4 / 2
                },
                numeroAleatorio(){ // Explicação
                     return Math.round(Math.random()*100)
                }
            }
        }
        const vm = new Vue(options); // vm = viewModel

        // console.log(vm);
    </script>
</body>
</html>
