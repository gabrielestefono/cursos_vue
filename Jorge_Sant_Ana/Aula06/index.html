<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="./vue.js"></script>
    <style>
        .verde{
            color: green;
        }
        .negrito{
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div id="app">
        <a :href="site">Site</a>
        <p :class="cor" class="negrito">Entendendo a diretiva </p>
        <input type="text" :placeholder="instrucaoDePreenchimento" :value="valor">
        <input type="checkbox" name="" id="" :checked="check">
    </div>
    <script>
        options = {
            el: "#app", // # para selecionar por id e . para selecionar por class
            data: {
                site: "https://gabrielestefono.com.br",
                cor: "verde",
                instrucaoDePreenchimento:"Placeholder - diretiva v-bind",
                valor: "Entendendo a diretiva v-bind",
                check: true
            },
            methods: {}
        }
        const vm = new Vue(options); // vm = viewModel
    </script>
</body>
</html>
