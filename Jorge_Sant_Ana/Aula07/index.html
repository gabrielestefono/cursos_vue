<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="./vue.js"></script>
    <style>
        .verde{
            background-color: green;
        }
        .azul{
            background-color: blue;
        }
    </style>
</head>
<body>
    <div id="app">
        {{mensagem.substr(0,3)}}
        <input :value="2 + 2" :class="teste ? 'verde' : estilo">
    </div>
    <script>
        options = {
            el: "#app", // # para selecionar por id e . para selecionar por class
            data: {
                mensagem: "Expressão",
                estilo: "azul",
                teste: true
            },
            methods: {}
        }
        const vm = new Vue(options); // vm = viewModel
    </script>
</body>
</html>
