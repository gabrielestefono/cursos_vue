<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="./vue.js"></script>
    <style>
        .verde{
            color: green;
        }
    </style>
</head>
<body>
    <div id="app">
        <a v-bind:href="site">Site</a>
        <p v-bind:class="cor">Entendendo a diretiva v-bind</p>
        <input type="text" v-bind:placeholder="instrucaoDePreenchimento" v-bind:value="valor">
        <input type="checkbox" name="" id="" v-bind:checked="check">
    </div>
    <script>
        options = {
            el: "#app", // # para selecionar por id e . para selecionar por class
            data: {
                site: "https://gabrielestefono.com.br",
                cor: "verde",
                instrucaoDePreenchimento:"Placeholder - diretiva v-bind",
                valor: "Entendendo a diretiva v-bind",
                check: true
            },
            methods: {}
        }
        const vm = new Vue(options); // vm = viewModel
    </script>
</body>
</html>
