<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="./vue.js"></script>
</head>
<body>
    <div id="app">
        {{somar()}} <br>
        {{subtrair()}}<br>
        {{multiplicar()}}<br>
        {{dividir()}}<br>
    </div>
    <script>
        options = {
            el: "#app", // # para selecionar por id e . para selecionar por class
            data: {
                n1: 10,
                n2: 5
            },
            methods: {
                somar: function somar(){ // Sintaxe Convencional
                    return this.n1 + this.n2
                },
                subtrair: function(){ // anônima
                    return this.n1 - this.n2
                },
                multiplicar: ()=>{ // Arrow Function
                    return  this.n1 * this.n2 // Contexto léxico -- Era pra dar erro!
                },
                dividir(){ // Forma mais enxuta
                    return this.n1 / this.n2
                }
            }
        }
        const vm = new Vue(options); // vm = viewModel
    </script>
</body>
</html>
