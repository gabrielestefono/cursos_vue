<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="./vue.js"></script>
    <style>
        .borda{
            border: 1px solid;
        }

        .div-principal{
            width: 200px;
            height: 200px;
        }

        .div-comum{
            width: 50px;
            height: 50px;
            display: inline-block;
        }

        .verde{
            background-color: green;
        }

        .branco{
            background-color: white;
        }

        .azul{
            background-color: blue;
        }

        .vermelho{
            background-color: red;
        }
        </style>
</head>
<body>
    <div id="app">
        <a href="https://gabrielestefono.com.br" target="_blank" v-on:click.prevent="prevenirComportamentoPadrao(   )">Link</a>
        Mensagem: {{msg}}
        <hr>
        <button @click.once="executarUmaVez()">Botão</button>
        <p>Cliques: {{cliques}}</p>
        <hr>
        <form action="" @submit.prevent.once="prevenirUmaVez">
            <button type="submit">Enviar</button>
        </form>
        <p>Formulario: {{formulario}}</p>
        <hr>
        <input type="text" @keyup="capturandoTeclas($event)">
        <p>teclas: {{teclas}}</p>
    </div>
    <script>
        options = {
            el: "#app", // # para selecionar por id e . para selecionar por class
            data: {
                msg: '',
                cliques: 0,
                formulario: '',
                teclas: ''
            },
            methods: {
                prevenirComportamentoPadrao(event){
                    this.msg = "Comportamento Padrão Ativado"
                },
                executarUmaVez(){
                    this.cliques++;
                },
                prevenirUmaVez(){
                    this.formulario = 'Prevenindo o comportamento padrão.'
                },
                capturandoTeclas(event){
                    this.teclas += event.key
                }
            }
        }
        const vm = new Vue(options); // vm = viewModel
    </script>
</body>
</html>
