<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="./vue.js"></script>
    <style>
        .borda{
            border: 1px solid;
        }

        .div-principal{
            width: 200px;
            height: 200px;
        }

        .div-comum{
            width: 50px;
            height: 50px;
            display: inline-block;
        }

        .verde{
            background-color: green;
        }

        .branco{
            background-color: white;
        }

        .azul{
            background-color: blue;
        }

        .vermelho{
            background-color: red;
        }
        </style>
</head>
<body>
    <div id="app">
        <div class="borda div-principal" :class="cor">
            Cor: {{ cor }} <br>
            Posição X do mouse: {{posicaoX}}
            Posição Y do mouse: {{posicaoY}}
        </div>
        <hr>
        <div @click="mudarCor('verde')" class="borda div-comum">
        </div>
        <div @mouseover="mudarCor('azul')" class="borda div-comum" @mouseout="mudarCor('vermelho')"></div>
        <div @mousemove="coordenadas($event)" class="borda div-comum"></div>
    </div>
    <script>
        options = {
            el: "#app", // # para selecionar por id e . para selecionar por class
            data: {
                cor: "branco",
                posicaoX: 0,
                posicaoY: 0
            },
            methods: {
                mudarCor(c){
                    this.cor = c;
                },
                coordenadas(e){
                    this.posicaoY = e.clientY
                    this.posicaoX = e.clientX
                }
            }
        }
        const vm = new Vue(options); // vm = viewModel
    </script>
</body>
</html>
